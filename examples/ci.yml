name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    # Testcontainers integration tests use the host Docker on ubuntu-latest
    # (preinstalled — no services: docker: dind needed)
    env:
      TESTCONTAINERS_RYUK_DISABLED: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # commitlint requires full history to scan all commits in the PR

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check format
        run: ./gradlew checkFormat

      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: SpotBugs
        run: ./gradlew spotbugsMain

      - name: Test (includes ArchUnit + Testcontainers)
        run: ./gradlew compileJava compileTestJava test

      - name: Build
        run: ./gradlew build bootJar
