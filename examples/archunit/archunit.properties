# ArchUnit 1.4+ fails rules whose `that()` clause matches no classes by default.
# On a day-0 skeleton (no controllers/services/repositories yet) this causes
# all Rule 2~5 rules to vacuously fail. Opt out of the empty-should fail so
# the template boots with a green test suite; once real classes land you can
# flip this to true (or delete the file) for strict enforcement.
archRule.failOnEmptyShould=false
